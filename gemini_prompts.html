function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyToClipboard(text, btn) {
  var method = 'api';
  function done(ok) {
    if (ok) {
      btn.textContent = '\u2713 Copied!';
      btn.className = 'copy-btn copied';
      setTimeout(function(){ btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 2000);
    } else {
      btn.textContent = 'Failed';
      btn.className = 'copy-btn failed';
      setTimeout(function(){ btn.textContent = 'Copy'; btn.className = 'copy-btn'; }, 2000);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function(){ done(true); }).catch(function(){ method = 'fallback'; });
  } else {
    method = 'fallback';
  }
  if (method === 'fallback') {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try {
      done(document.execCommand('copy'));
    } catch(e) {
      done(false);
    }
    document.body.removeChild(ta);
  }
}

function render() {
  var container = document.getElementById('products');
  var groups = {};
  products.forEach(function(p) {
    if (!groups[p.group]) groups[p.group] = [];
    groups[p.group].push(p);
  });

  var groupNames = Object.keys(groups);
  groupNames.forEach(function(groupName) {
    var groupProducts = groups[groupName];
    var header = document.createElement('div');
    header.style.cssText = 'grid-column: 1 / -1; font-size: 20px; font-weight: 700; color: #1a1a2e; margin-top: 8px; padding: 8px 0; border-bottom: 2px solid #1a1a2e;';
    header.textContent = '\uD83D\uDCC1 ' + groupName + ' (' + groupProducts.length + ')';
    container.appendChild(header);

    groupProducts.forEach(function(p) {
      var card = document.createElement('div');
      card.className = 'card';

      var refHtml = p.refs.length === 0
        ? '<span class="no-ref">Без референсу</span>'
        : p.refs.map(function(r){ return '<img src="references/' + r + '" alt="' + r + '" title="' + r + '" onerror="this.style.display=\'none\'">'; }).join('');

      card.innerHTML =
        '<div class="card-header"><span class="name">' + p.name + '</span><span class="id">' + p.id + '</span></div>' +
        '<div class="card-body">' +
        '<div class="refs">' + refHtml + '</div>' +
        '<div class="prompt">' + escapeHtml(p.prompt) +
        '<button class="copy-btn" data-prompt="' + escapeHtml(p.prompt) + '">Copy</button></div>' +
        '</div>';

      // Attach click handler
      card.querySelector('.copy-btn').onclick = function() {
        copyToClipboard(this.getAttribute('data-prompt'), this);
      };

      container.appendChild(card);
    });
  });
}
